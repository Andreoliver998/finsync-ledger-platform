name: Build and Optional Deploy

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to VPS over SSH"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Generate Prisma client
        run: npm run prisma:generate --prefix backend

      - name: Run backend tests
        run: npm test --prefix backend

      - name: Build frontend
        run: npm run build --prefix frontend
        env:
          VITE_API_BASE_URL: https://api-finsync.paytech.app.br/api
          VITE_APP_NAME: FinSync
          VITE_APP_ENV: production

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.APP_DIR }}"
            git pull --ff-only
            npm ci --prefix backend
            npm run prisma:generate --prefix backend
            npm run prisma:push --prefix backend
            npm ci --prefix frontend
            npm run build --prefix frontend
            sudo rsync -a --delete frontend/dist/ /var/www/finsync/frontend/dist/
            pm2 startOrReload ecosystem.config.cjs --env production
            pm2 save
            sudo nginx -t
            sudo systemctl reload nginx
